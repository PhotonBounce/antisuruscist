name: Deploy staging to GitHub Pages

# Publishes the static game to a GitHub Pages STAGING URL on a separate host
# (https://<owner>.github.io/<repo>/) so the WIP branch can be tested without
# touching the production cPanel site — it CANNOT affect anti-ruscist.com.
#
# Publishes to a `gh-pages` branch via the built-in GITHUB_TOKEN. This avoids
# the `github-pages` deployment environment, whose branch policy only permits
# the default branch — letting us deploy this WIP branch automatically.
#
# Staging runs offline (localStorage), mirroring production — no backend needed.

on:
  push:
    branches: [claude/stoic-davinci-o63qlb]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: pages-gh
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (web assets only)
        run: |
          rm -rf _site && mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.devcontainer' \
            --exclude '.vscode' \
            --exclude '_site' \
            --exclude 'server' \
            --exclude 'node_modules' \
            --exclude 'nft-deploy' \
            --exclude 'contracts' \
            --exclude 'screencaptures' \
            --exclude 'tests' \
            --exclude 'qa-*.js' \
            --exclude '*-qa.js' \
            --exclude 'headless-qa-proxy.js' \
            --exclude '*.test.js' \
            --exclude 'playwright.config.js' \
            --exclude '*.sh' \
            --exclude '*.log' \
            --exclude '*.md' \
            --exclude '*.txt' \
            --exclude 'admin.html' \
            --exclude 'sitemap.xml' \
            --exclude '.htaccess' \
            --exclude '.cpanel.yml' \
            --exclude '.gitignore' \
            --exclude 'package.json' \
            --exclude 'package-lock.json'
          # Disable Jekyll so files are served verbatim from the sub-path.
          touch _site/.nojekyll
          # Staging must NOT be indexed by search engines (avoid competing with
          # the production site's SEO / duplicate content).
          printf 'User-agent: *\nDisallow: /\n' > _site/robots.txt

      - name: Publish to gh-pages branch
        run: |
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy staging from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Best-effort — point Pages at the gh-pages branch (zero-touch go-live)
        continue-on-error: true
        run: |
          # Try to set the Pages source to the gh-pages branch so the site goes
          # live automatically. This may need elevated permissions; if it is
          # rejected, the one-time Settings → Pages toggle (see summary) covers it.
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          auth="Authorization: Bearer ${GITHUB_TOKEN}"
          acc="Accept: application/vnd.github+json"
          ver="X-GitHub-Api-Version: 2022-11-28"
          body='{"source":{"branch":"gh-pages","path":"/"},"build_type":"legacy"}'
          # Update first (Pages already enabled from an earlier run)...
          code=$(curl -s -o /tmp/pr.json -w '%{http_code}' -X PUT -H "$auth" -H "$acc" -H "$ver" "$api" -d "$body")
          echo "PUT  /pages -> $code"; cat /tmp/pr.json 2>/dev/null || true
          # ...otherwise create it.
          if [ "$code" = "404" ]; then
            code=$(curl -s -o /tmp/pc.json -w '%{http_code}' -X POST -H "$auth" -H "$acc" -H "$ver" "$api" -d "$body")
            echo "POST /pages -> $code"; cat /tmp/pc.json 2>/dev/null || true
          fi
          echo "PAGES_SET_CODE=$code" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          echo "### Staging built and pushed to \`gh-pages\` ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${PAGES_SET_CODE:-}" = "200" ] || [ "${PAGES_SET_CODE:-}" = "201" ]; then
            echo "Pages source set to \`gh-pages\` automatically — site goes live shortly at:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Could not set the Pages source automatically (code \`${PAGES_SET_CODE:-n/a}\`)." >> "$GITHUB_STEP_SUMMARY"
            echo "One-time step: **Settings → Pages → Source → Deploy from a branch → \`gh-pages\` / \`/ (root)\` → Save**, then:" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$url\`" >> "$GITHUB_STEP_SUMMARY"
